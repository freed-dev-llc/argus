# Runs the Argus HTTP server against an EXTERNAL, already-running NetBox.
# Bundling NetBox itself (Postgres + Redis + the app) is a separate, later profile.
#
#   NETBOX_URL=https://netbox.lan NETBOX_TOKEN=xxxx docker compose up --build
#
services:
  argus-server:
    build: ./server
    image: argus-server:local
    environment:
      NETBOX_URL: ${NETBOX_URL:-}
      NETBOX_TOKEN: ${NETBOX_TOKEN:-}
      NETBOX_VERIFY_SSL: ${NETBOX_VERIFY_SSL:-true}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
    ports:
      - "8080:8080"
    restart: unless-stopped
