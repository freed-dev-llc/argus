name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Jobs `server` and `web` are the required status checks on main.
# (Switch `runs-on` to [self-hosted, linux] to use the freed-dev-llc Spark/Thor fleet.)
jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      - name: Mypy
        run: mypy src
        continue-on-error: true
      - name: Pytest
        run: pytest -v --cov=argus --cov-report=term-missing

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
