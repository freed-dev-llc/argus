name: Release

# Tag a signed `vX.Y.Z` on main to cut a GitHub Release.
#   git tag -s v0.1.0 -m "Release v0.1.0" && git push origin v0.1.0
# Container image / PyPI publishing is deferred (see docs/ROADMAP.md).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
