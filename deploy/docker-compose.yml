# Self-contained Argus validation stack: NetBox (with its own internal Postgres +
# Redis) + Argus server + Argus web. Bring up from this directory with a populated
# .env (see .env.example):
#
#   docker compose --env-file .env up -d --build
#
# Internal Postgres/Redis are NOT published — they won't clash with any host services.
# Published ports: 8095 (Argus dashboard), 8096 (NetBox UI), 127.0.0.1:8094 (Argus API).
name: argus

x-netbox-env: &netbox-env
  DB_HOST: netbox-postgres
  DB_NAME: netbox
  DB_USER: netbox
  DB_PASSWORD: ${POSTGRES_PASSWORD}
  DB_PORT: "5432"
  REDIS_HOST: netbox-redis
  REDIS_PORT: "6379"
  REDIS_DATABASE: "0"
  REDIS_SSL: "false"
  REDIS_CACHE_HOST: netbox-redis
  REDIS_CACHE_PORT: "6379"
  REDIS_CACHE_DATABASE: "1"
  REDIS_CACHE_SSL: "false"
  SECRET_KEY: ${NETBOX_SECRET_KEY}
  ALLOWED_HOSTS: "*"
  # Space-separated https origin(s) trusted for CSRF when NetBox is served over HTTPS
  # behind a proxy/tunnel (NetBox v4 / Django requires this for login + edit POSTs).
  # Empty = none, e.g. NETBOX_CSRF_TRUSTED_ORIGINS=https://netbox.example.com — see README.
  CSRF_TRUSTED_ORIGINS: ${NETBOX_CSRF_TRUSTED_ORIGINS:-}
  SKIP_SUPERUSER: "false"
  SUPERUSER_NAME: admin
  SUPERUSER_EMAIL: admin@example.com
  SUPERUSER_PASSWORD: ${NETBOX_SUPERUSER_PASSWORD}

services:
  netbox-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: netbox
      POSTGRES_USER: netbox
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - netbox-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netbox"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  netbox-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  netbox:
    image: ${NETBOX_IMAGE:-netboxcommunity/netbox:v4.6-5.0.1}
    depends_on:
      netbox-postgres:
        condition: service_healthy
      netbox-redis:
        condition: service_healthy
    environment: *netbox-env
    volumes:
      - netbox-media:/opt/netbox/netbox/media
    ports:
      - "8096:8080"
    healthcheck:
      test:
        - CMD
        - /opt/netbox/venv/bin/python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/login/').status==200 else 1)"
      interval: 15s
      timeout: 10s
      retries: 25
      start_period: 180s
    restart: unless-stopped

  netbox-worker:
    image: ${NETBOX_IMAGE:-netboxcommunity/netbox:v4.6-5.0.1}
    depends_on:
      netbox:
        condition: service_healthy
    environment: *netbox-env
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - rqworker
    restart: unless-stopped

  # One-shot: create the v1 API token Argus uses. pynetbox sends "Token <value>", which
  # NetBox 4.6 matches as a v1 token; NetBox's own provisioning only mints v2 tokens
  # (Bearer <key>.<token>), which pynetbox can't present — so we create the v1 token here.
  netbox-init:
    image: ${NETBOX_IMAGE:-netboxcommunity/netbox:v4.6-5.0.1}
    depends_on:
      netbox:
        condition: service_healthy
    environment:
      <<: *netbox-env
      NETBOX_API_TOKEN: ${NETBOX_API_TOKEN}
    command:
      - /opt/netbox/venv/bin/python
      - /opt/netbox/netbox/manage.py
      - shell
      - -c
      - |
        import os
        from django.contrib.auth import get_user_model
        from users.models import Token
        u = get_user_model().objects.filter(is_superuser=True).order_by("pk").first()
        key = os.environ.get("NETBOX_API_TOKEN", "")
        if u and key and not Token.objects.filter(version=1, plaintext=key).exists():
            t = Token(user=u, version=1)
            t.token = key
            t.save()
            print("argus-init: created v1 API token")
        else:
            print("argus-init: token already present or no superuser")
    restart: "no"

  argus-server:
    build: ../server
    image: argus-server:local
    depends_on:
      netbox:
        condition: service_healthy
      netbox-init:
        condition: service_completed_successfully
    environment:
      NETBOX_URL: http://netbox:8080
      NETBOX_TOKEN: ${NETBOX_API_TOKEN}
      NETBOX_VERIFY_SSL: "true"
      UNIFI_URL: ${UNIFI_URL:-}
      UNIFI_API_TOKEN: ${UNIFI_API_TOKEN:-}
      UNIFI_SITE: ${UNIFI_SITE:-default}
      UNIFI_VERIFY_SSL: "false"
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
      # Optional: require Authorization: Bearer <token> on /api and /webhooks.
      # Unset = open (default). When set, NetBox webhooks must send the matching header.
      # HTTP_TOKEN: ${HTTP_TOKEN:-}
      # Optional: scheduled drift discovery (in-process). SCHEDULE_INTERVAL is seconds
      # between cycles; 0/unset disables it (default). When >0, Argus runs the collector,
      # diffs against NetBox, and exposes the result at GET /api/drift/status. Set
      # ALERT_WEBHOOK_URL to also POST a Slack-compatible {"text": ...} alert on drift.
      # SCHEDULE_INTERVAL: ${SCHEDULE_INTERVAL:-0}      # e.g. 300 = every 5 minutes
      # SCHEDULE_COLLECTOR: ${SCHEDULE_COLLECTOR:-unifi}
      # ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    ports:
      - "127.0.0.1:8094:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8080/health').status==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  argus-web:
    build: ../web
    image: argus-web:local
    depends_on:
      argus-server:
        condition: service_healthy
    environment:
      # Forwarded to nginx's envsubst so the dashboard's /api proxy sends
      # Authorization: Bearer <token>. Must match argus-server's HTTP_TOKEN for the
      # dashboard to authenticate against an auth-enabled API (unset = open default).
      HTTP_TOKEN: ${HTTP_TOKEN:-}
    ports:
      - "8095:80"
    restart: unless-stopped

volumes:
  netbox-postgres-data:
  netbox-media:
