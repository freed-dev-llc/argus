server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Argus API + health are proxied to the FastAPI server on the compose network.
    location /api/ {
        proxy_pass http://argus-server:8080;
        proxy_set_header Host $host;
    }
    location = /health {
        proxy_pass http://argus-server:8080/health;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
