<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 72" width="372" height="72" role="img" aria-label="Reach Remote — freed-dev-llc/reach">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1A2C39"/><stop offset="1" stop-color="#0F1C25"/></linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6E9DBA"/><stop offset="1" stop-color="#4E7C97"/></linearGradient>
    <linearGradient id="cp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C4683F"/><stop offset="1" stop-color="#974124"/></linearGradient>
  </defs>

  <rect x="1" y="1" width="370" height="70" rx="16" fill="url(#bg)" stroke="#2C4C61" stroke-width="1.5"/>

  <!-- glyph: a source node reaching a remote node across signal arcs (Reach's own mark) -->
  <g transform="translate(16,9) scale(0.38)">
    <g fill="none" stroke="#4E7C97" stroke-linecap="round">
      <path d="M40.7 52.1 A26 26 0 0 1 40.7 91.9" stroke-width="3.5" opacity="0.9"/>
      <path d="M52.3 38.3 A44 44 0 0 1 52.3 105.7" stroke-width="3" opacity="0.55"/>
      <path d="M63.9 24.5 A62 62 0 0 1 63.9 119.5" stroke-width="2.5" opacity="0.3"/>
    </g>
    <g stroke="#EAF2F7" stroke-opacity="0.10" stroke-width="1">
      <rect x="9" y="57" width="30" height="30" rx="8" fill="url(#node)"/>
      <rect x="98" y="52" width="40" height="40" rx="10" fill="url(#cp)"/>
    </g>
    <g>
      <circle cx="24" cy="72" r="5" fill="#EAF2F7" opacity="0.85"/>
      <circle cx="118" cy="72" r="6" fill="#FBEEE3" opacity="0.92"/>
    </g>
  </g>

  <!-- label -->
  <g font-family="'Segoe UI','SF Pro Display',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif">
    <text x="92" y="31" font-size="18" font-weight="700" letter-spacing="0.3" fill="#EAF2F7">Reach <tspan fill="#C4683F">Remote</tspan></text>
    <text x="92" y="52" font-size="10.5" font-weight="500" letter-spacing="0.2" fill="#7FA6BC" font-family="'SF Mono',ui-monospace,Menlo,Consolas,monospace">freed-dev-llc/reach</text>
  </g>
</svg>
