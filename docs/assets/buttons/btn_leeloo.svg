    <g>
      <circle cx="36" cy="36" r="5" fill="#EAF2F7" opacity="0.85"/>
      <circle cx="138" cy="36" r="5" fill="#EAF2F7" opacity="0.85"/>
      <circle cx="36" cy="120" r="5" fill="#EAF2F7" opacity="0.85"/>
      <circle cx="138" cy="120" r="5" fill="#EAF2F7" opacity="0.85"/>
      <circle cx="85" cy="72" r="6" fill="#FBEEE3" opacity="0.92"/>
    </g>
