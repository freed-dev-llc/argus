<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 72" width="372" height="72" role="img" aria-label="Aria Voice — freed-dev-llc/aria">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1A2C39"/><stop offset="1" stop-color="#0F1C25"/></linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6E9DBA"/><stop offset="1" stop-color="#4E7C97"/></linearGradient>
    <linearGradient id="cp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C4683F"/><stop offset="1" stop-color="#974124"/></linearGradient>
  </defs>

  <rect x="1" y="1" width="370" height="70" rx="16" fill="url(#bg)" stroke="#2C4C61" stroke-width="1.5"/>

  <!-- glyph: voice waveform -->
  <g transform="translate(16,12) scale(0.33)">
    <line x1="-10" y1="72" x2="184" y2="72" stroke="#4E7C97" stroke-width="3" stroke-linecap="round" opacity="0.30"/>
    <g stroke="#EAF2F7" stroke-opacity="0.10" stroke-width="1">
      <rect x="0" y="52" width="22" height="40" rx="11" fill="url(#node)"/>
      <rect x="38" y="30" width="22" height="84" rx="11" fill="url(#node)"/>
      <rect x="76" y="8" width="22" height="128" rx="11" fill="url(#cp)"/>
      <rect x="114" y="30" width="22" height="84" rx="11" fill="url(#node)"/>
      <rect x="152" y="52" width="22" height="40" rx="11" fill="url(#node)"/>
    </g>
    <g>
      <circle cx="11" cy="72" r="5" fill="#EAF2F7" opacity="0.85"/>
      <circle cx="49" cy="72" r="5" fill="#EAF2F7" opacity="0.85"/>
      <circle cx="87" cy="72" r="6" fill="#FBEEE3" opacity="0.92"/>
      <circle cx="125" cy="72" r="5" fill="#EAF2F7" opacity="0.85"/>
      <circle cx="163" cy="72" r="5" fill="#EAF2F7" opacity="0.85"/>
    </g>
  </g>

  <!-- label -->
  <g font-family="'Segoe UI','SF Pro Display',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif">
    <text x="92" y="31" font-size="18" font-weight="700" letter-spacing="0.3" fill="#EAF2F7">Aria <tspan fill="#C4683F">Voice</tspan></text>
    <text x="92" y="52" font-size="10.5" font-weight="500" letter-spacing="0.2" fill="#7FA6BC" font-family="'SF Mono',ui-monospace,Menlo,Consolas,monospace">freed-dev-llc/aria</text>
  </g>
