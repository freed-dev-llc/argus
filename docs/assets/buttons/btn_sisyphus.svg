<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 372 72" width="372" height="72" role="img" aria-label="Sisyphus — freed-dev-llc/sisyphus">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1A2C39"/><stop offset="1" stop-color="#0F1C25"/></linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6E9DBA"/><stop offset="1" stop-color="#4E7C97"/></linearGradient>
    <linearGradient id="cp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#C4683F"/><stop offset="1" stop-color="#974124"/></linearGradient>
  </defs>

  <rect x="1" y="1" width="370" height="70" rx="16" fill="url(#bg)" stroke="#2C4C61" stroke-width="1.5"/>

  <!-- glyph: boulder on an incline (Sisyphus's own mark); boulder = the warm accent -->
  <g transform="translate(15,0) scale(0.40)">
    <polygon points="8,138 138,138 138,44" fill="url(#node)" opacity="0.18"/>
    <line x1="8" y1="138" x2="138" y2="138" stroke="#4E7C97" stroke-width="3" stroke-linecap="round" opacity="0.35"/>
    <line x1="8" y1="138" x2="138" y2="44" stroke="#4E7C97" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    <polyline points="116,50 130,44 134,58" fill="none" stroke="#7FA6BC" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="57" cy="68" r="28" fill="url(#cp)" stroke="#EAF2F7" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="48" cy="59" r="6.5" fill="#FBEEE3" opacity="0.92"/>
  </g>

  <!-- label -->
  <g font-family="'Segoe UI','SF Pro Display',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif">
    <text x="92" y="31" font-size="18" font-weight="700" letter-spacing="0.3" fill="#EAF2F7">Sisyphus</text>
    <text x="92" y="52" font-size="10.5" font-weight="500" letter-spacing="0.2" fill="#7FA6BC" font-family="'SF Mono',ui-monospace,Menlo,Consolas,monospace">freed-dev-llc/sisyphus</text>
  </g>
</svg>
