<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="800" height="260" role="img" aria-label="Argus Net — Discover, Diff, Reconcile">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1A2C39"/><stop offset="1" stop-color="#0F1C25"/>
    </linearGradient>
    <linearGradient id="node" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6E9DBA"/><stop offset="1" stop-color="#4E7C97"/>
    </linearGradient>
    <linearGradient id="cp" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#CDA052"/><stop offset="1" stop-color="#9C6F2E"/>
    </linearGradient>
  </defs>

  <!-- panel -->
  <rect x="1" y="1" width="798" height="258" rx="28" fill="url(#bg)" stroke="#2C4C61" stroke-width="1.5"/>

  <!-- all-seeing eye: almond outline, node-mesh feeders into the iris, amber pupil + catchlight -->
  <g transform="translate(80,58)">
    <g stroke="#4E7C97" fill="none" stroke-linecap="round" opacity="0.26" stroke-width="2">
      <line x1="4" y1="72" x2="55" y2="72"/>
      <line x1="166" y1="72" x2="115" y2="72"/>
    </g>
    <path d="M 4 72 Q 85 26 166 72 Q 85 118 4 72 Z" fill="none" stroke="#6E9DBA" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="85" cy="72" r="30" fill="none" stroke="#4E7C97" stroke-width="3" opacity="0.5"/>
    <circle cx="85" cy="72" r="16" fill="url(#cp)" stroke="#EAF2F7" stroke-opacity="0.10" stroke-width="1"/>
    <circle cx="90" cy="67" r="4.5" fill="#FBEEE3" opacity="0.92"/>
    <circle cx="4"   cy="72" r="5" fill="#EAF2F7" opacity="0.85"/>
    <circle cx="166" cy="72" r="5" fill="#EAF2F7" opacity="0.85"/>
  </g>

  <!-- wordmark -->
  <g font-family="'Segoe UI','SF Pro Display',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif">
    <text x="308" y="110" font-size="62" font-weight="800" letter-spacing="0.5" fill="#EAF2F7">ARGUS<tspan fill="#C5953F" dx="20">NET</tspan></text>
    <rect x="310" y="128" width="338" height="3" rx="1.5" fill="#C5953F" opacity="0.8"/>
    <text x="312" y="160" font-size="14.5" font-weight="600" letter-spacing="2.2" fill="#7FA6BC">DISCOVER · DIFF · RECONCILE</text>
    <text x="312" y="200" font-size="21" font-weight="800" letter-spacing="7" fill="#C5953F">SOURCE OF TRUTH</text>
  </g>
</svg>
